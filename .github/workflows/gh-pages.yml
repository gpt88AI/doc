name: Deploy to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        run: npm run release:check
        env:
          VITE_BASE_PATH: /

      - name: Add CNAME
        run: printf '%s\n' 'doc.gpt88.cc' > dist/CNAME

      - name: Write deploy marker
        run: |
          printf 'commit=%s\n' "${GITHUB_SHA}" > dist/deploy-version.txt
          printf 'run_id=%s\n' "${GITHUB_RUN_ID}" >> dist/deploy-version.txt
          printf 'deployed_at=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> dist/deploy-version.txt

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist
          force_orphan: true
